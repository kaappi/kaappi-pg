name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Start PostgreSQL
        run: |
          brew install postgresql@14
          brew services start postgresql@14
          sleep 3
          /opt/homebrew/opt/postgresql@14/bin/createdb kaappi_test || true

      - name: Build Kaappi
        run: |
          git clone --depth 1 https://github.com/kaappi/kaappi.git /tmp/kaappi
          cd /tmp/kaappi && zig build

      - name: Build native library
        run: make

      - name: Run type tests (offline)
        run: /tmp/kaappi/zig-out/bin/kaappi --lib-path lib tests/test-types.scm

      - name: Run DB-API tests
        run: |
          /tmp/kaappi/zig-out/bin/kaappi --lib-path lib tests/test-dbapi.scm
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}
